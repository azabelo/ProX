# Example config for finetuning/finetune.py
#
# VeOmni (multi-GPU auto-reexec when num_gpus > 1):
#   python finetuning/finetune.py finetuning/example_finetune.yaml
#
# Or explicitly:
#   torchrun --standalone --nproc_per_node=8 finetuning/finetune.py finetuning/example_finetune.yaml

model_arch: auto
model_type: veomni_supported  # veomni_supported | huggingface | custom_local

init_model_path: Qwen/Qwen2.5-0.5B
tokenizer_path: null  # defaults to init_model_path

# VeOmni DCP checkpoint dir for full resume (optimizer + scheduler), e.g. .../checkpoints/global_step_1000
resume_checkpoint_path: null

# Match openrouter_data_generation run (e.g. openrouter_output_data/rewrite/1000docs/example_openrouter_rewrite.yaml)
inputs_dir_path: data/raw/DCLM-baseline-one-shard/global-shard_01_of_10/local-shard_0_of_10
outputs_dir_path: openrouter_output_data/rewrite/1000docs

# Same adapters as openrouter_data_generation: fineweb | dclm | redpajama | redpajama-v2 | passthrough
dataset_type: dclm

chunk_size: 1000
is_code: false
packing: false
include_loss_from_input: false
# Append tokenizer EOS to each target when missing so CE can supervise EOS as last assistant token.
ensure_eos_on_target: true

num_gpus: 1
num_validation_documents: 50

max_seq_len: 2048
max_steps: 50
num_train_epochs: 1  # VeOmni uses max_steps when set (caps steps per epoch)
global_batch_size: 8
micro_batch_size: 1

learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.03
lr_decay_style: cosine
max_grad_norm: 1.0

save_every_steps: 500
eval_every_steps: 50  # set > 0 to run periodic val loss (VeOmni: rank 0 only)
eval_max_batches: 20

checkpoint_output_dir: ./finetuning_outputs/example_run

seed: 42
wandb_project: prox-finetune
wandb_run_name: null

gradient_checkpointing: true

# custom_local only: "module.path:build_fn" — fn receives config dict from this YAML
custom_model_factory: null

# Deep-merge into VeOmniArguments (optional)
veomni: {}
