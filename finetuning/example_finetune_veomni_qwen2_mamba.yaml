# VeOmni ``qwen2_mamba``: Qwen2.5-0.5B–shaped width/depth/FFN; every decoder layer uses a Mamba-style block instead of attention.
# Random init (no HF checkpoint). Tokenizer: Qwen/Qwen2.5-0.5B.
#
# From repo root (single entrypoint — ``num_gpus: 8`` re-execs via torch.distributed.run when needed):
#   PYTHONPATH=finetuning/veomni python finetuning/finetune.py finetuning/example_finetune_veomni_qwen2_mamba.yaml

model_arch: auto
model_type: veomni_supported

init_model_path: ""

tokenizer_path: Qwen/Qwen2.5-0.5B

resume_checkpoint_path: null

inputs_dir_path: data/raw/DCLM-baseline-one-shard/global-shard_01_of_10/local-shard_0_of_10
outputs_dir_path: openrouter_output_data/rewrite/1000docs

dataset_type: dclm
chunk_size: 1000
is_code: false
packing: false
include_loss_from_input: false
ensure_eos_on_target: true

num_gpus: 8
num_validation_documents: 50

max_seq_len: 512
max_steps: 20
num_train_epochs: 1
micro_batch_size: 1
# Must be divisible by (micro_batch_size * data_parallel_size); with 8 GPUs use a multiple of 8.
global_batch_size: 8
learning_rate: 2e-5
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
lr_decay_style: cosine
gradient_checkpointing: false

eval_every_steps: 20
eval_max_batches: 10
save_every_steps: 10000

wandb_project: prox-finetune
wandb_run_name: veomni-qwen2-mamba-0.5b-shape

checkpoint_output_dir: ./finetuning_outputs/veomni_qwen2_mamba_qwen05b_shape

custom_arch: {}

model_config:
  architectures: [Qwen2MambaForCausalLM]
  model_type: qwen2_mamba
  attention_dropout: 0.0
  bos_token_id: 151643
  eos_token_id: 151643
  hidden_act: silu
  hidden_size: 896
  initializer_range: 0.02
  intermediate_size: 4864
  max_position_embeddings: 32768
  max_window_layers: 24
  num_attention_heads: 14
  num_hidden_layers: 24
  num_key_value_heads: 2
  rms_norm_eps: 1.0e-06
  rope_theta: 1000000.0
  sliding_window: 32768
  tie_word_embeddings: true
  torch_dtype: bfloat16
  use_cache: true
  use_sliding_window: false
  vocab_size: 151936
  # Mamba stack (inner dim defaults to 2 * hidden_size if omitted)
  mamba_d_inner: 1792
  mamba_d_conv: 4

veomni_overrides:
  model:
    model_path: null
    tokenizer_path: Qwen/Qwen2.5-0.5B
