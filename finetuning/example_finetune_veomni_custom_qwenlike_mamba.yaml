# VeOmni training run for the custom Qwen-like + one-Mamba-layer architecture.
#
# Runs through the normal VeOmni path in `finetuning/finetune.py` (DDP/FSDP support, wandb, checkpoints).
#
# Single GPU:
#   python finetuning/finetune.py finetuning/example_finetune_veomni_custom_qwenlike_mamba.yaml
#
# Multi GPU:
#   torchrun --standalone --nproc_per_node=8 finetuning/finetune.py finetuning/example_finetune_veomni_custom_qwenlike_mamba.yaml
#
# This model is random-init (the factory builds from YAML `custom_arch`). `init_model_path`/`tokenizer_path`
# are used for tokenization + vocab size defaults.

model_arch: custom_qwenlike_one_mamba
model_type: veomni_supported

# Used for tokenizer + vocab_size default (unless overridden in custom_arch).
init_model_path: Qwen/Qwen2.5-0.5B
tokenizer_path: Qwen/Qwen2.5-0.5B

# Build model via VeOmni custom factory hook (see `veomni/trainer/base.py`).
custom_model_factory: my_architectures.qwen_like_one_mamba_layer:build_model

resume_checkpoint_path: null

inputs_dir_path: data/raw/DCLM-baseline-one-shard/global-shard_01_of_10/local-shard_0_of_10
outputs_dir_path: openrouter_output_data/rewrite/1000docs

dataset_type: dclm
chunk_size: 1000
is_code: false
packing: false
include_loss_from_input: false
ensure_eos_on_target: true

num_gpus: 1
num_validation_documents: 50

max_seq_len: 512
max_steps: 200
num_train_epochs: 1
global_batch_size: 8
micro_batch_size: 1

learning_rate: 3.0e-4
weight_decay: 0.01
warmup_ratio: 0.03
lr_decay_style: cosine
max_grad_norm: 1.0

save_every_steps: 500
eval_every_steps: 0
eval_max_batches: 20

checkpoint_output_dir: ./finetuning_outputs/veomni_custom_qwenlike_mamba_run

seed: 42
wandb_project: prox-finetune
wandb_run_name: veomni-custom-qwenlike-one-mamba

gradient_checkpointing: false

custom_arch:
  mamba_layer_index: 12
  mamba_d_inner: 512
  mamba_d_state: 16
  mamba_d_conv: 4

veomni: {}

