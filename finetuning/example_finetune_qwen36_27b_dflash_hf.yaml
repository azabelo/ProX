# Hugging Face Trainer path (model_type: huggingface) for z-lab/Qwen3.6-27B-DFlash.
# Model card: https://huggingface.co/z-lab/Qwen3.6-27B-DFlash
#
# The upstream card describes this checkpoint as the DFlash *drafter* (block diffusion) for speculative
# decoding with target Qwen/Qwen3.6-27B — not a drop-in replacement for ordinary causal LM finetuning.
# If forward() does not return loss for your labels, this script will fail (same class of issue as LLaDA).
#
# Use a dedicated env (Accelerate >= 0.26): bash finetuning/install_llada_hf_env.sh && conda activate prox-llada-hf
#
# Run:
#   python finetuning/finetune.py finetuning/example_finetune_qwen36_27b_dflash_hf.yaml

model_arch: auto
model_type: huggingface

init_model_path: z-lab/Qwen3.6-27B-DFlash
# DFlash repo often has no complete tokenizer files; use the target model tokenizer (see model card).
tokenizer_path: Qwen/Qwen3.6-27B

resume_checkpoint_path: null

inputs_dir_path: data/raw/DCLM-baseline-one-shard/global-shard_01_of_10/local-shard_0_of_10
outputs_dir_path: openrouter_output_data/rewrite/1000docs

dataset_type: dclm

chunk_size: 1000
is_code: false
packing: false
include_loss_from_input: false
ensure_eos_on_target: true

num_gpus: 1
num_validation_documents: 50

max_seq_len: 2048
max_steps: 50
num_train_epochs: 1
global_batch_size: 8
micro_batch_size: 1

learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.03
lr_decay_style: cosine
max_grad_norm: 1.0

save_every_steps: 500
eval_every_steps: 50
eval_max_batches: 20

checkpoint_output_dir: ./finetuning_outputs/qwen36_27b_dflash_hf_run

seed: 42
wandb_project: prox-finetune
wandb_run_name: qwen36-27b-dflash-hf

gradient_checkpointing: true

custom_model_factory: null

veomni: {}
